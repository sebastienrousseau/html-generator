name: CI
on:
  push:
    branches: [main, feat/**]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: sebastienrousseau/pipelines/.github/workflows/rust-ci.yml@main
    with:
      rust-version: 'stable'
      run-coverage: true
      # `cargo-features: ''` (the default) already means `--all-features`
      # in the reusable workflow; the previous `all-features: true` was
      # an undeclared input and caused `startup_failure` on every push.
      #
      # Coverage is reported on the library (`src/**`) only. Tarpaulin
      # otherwise instruments every .rs in the workspace — including
      # integration tests, benches, examples, and the build script —
      # and treats unexecuted branches in *those* files as uncovered
      # project lines, which depresses the percentage and makes the
      # codecov/patch + codecov/project gates flap on every PR that
      # adds tests.
      # `crates/*` is a vendored path dependency, not a workspace
      # member, so `coverage-exclude-packages` cannot reach it
      # (tarpaulin emits `excluded package(s) … not found in
      # workspace`). The file glob below is the durable mechanism.
      # The vendored `crates/yaml_safe/` is published-false and has
      # its own test harness that isn't executed by
      # `cargo test --all-features` on the parent package; counting
      # its 1 500+ lines as project code dragged the metric from
      # ~96% (src/) to ~54%.
      coverage-exclude: 'tests/*,benches/*,examples/*,build.rs,crates/*'
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    uses: sebastienrousseau/pipelines/.github/workflows/security.yml@main
    with:
      language: rust

  docs:
    if: github.ref == 'refs/heads/main'
    uses: sebastienrousseau/pipelines/.github/workflows/docs.yml@main
    with:
      type: rust
      redirect-crate: html-generator
