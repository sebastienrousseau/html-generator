# Advisories to ignore in cargo audit.
#
# RUSTSEC-2025-0141, RUSTSEC-2024-0320:
#   Transitive deps of syntect (via comrak/mdx-gen) — no direct
#   replacement available.
#
# RUSTSEC-2024-0421 (idna 0.3), RUSTSEC-2024-0388 (derivative 2.2):
#   Transitive deps of `markdown-it`, which is a `[dev-dependencies]`
#   entry used only by `benches/competitors.rs` for comparative
#   throughput numbers in the README. Never compiled into the
#   distributed crate; no runtime exposure.
[advisories]
ignore = [
    "RUSTSEC-2025-0141",
    "RUSTSEC-2024-0320",
    "RUSTSEC-2024-0421",
    "RUSTSEC-2024-0388",
]
